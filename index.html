<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hAIr Solution</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080604;
    --bg2: #110d08;
    --bg3: #1a1208;
    --amber: #F59E0B;
    --gold: #e8b84b;
    --copper: #c97f3a;
    --glow: #f59e0b55;
    --glow2: #c97f3a33;
    --text: #f5e6c8;
    --muted: #8a7055;
    --border: #3a2810;
    --glass: rgba(245,158,11,0.06);
    --glass2: rgba(201,127,58,0.08);
    --danger: #e05c3a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== GRID BACKGROUND ===== */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(245,158,11,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,158,11,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ===== RADIAL GLOW BG ===== */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(245,158,11,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== HEADER ===== */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(245,158,11,0.07) 0%, transparent 100%);
  }

  .logo-img {
    width: 52px;
    height: 52px;
    object-fit: contain;
    filter: drop-shadow(0 0 10px rgba(245,158,11,0.5));
  }

  .brand {
    display: flex;
    flex-direction: column;
  }

  .brand-name {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--amber) 0%, var(--gold) 50%, var(--copper) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    line-height: 1;
  }

  .brand-name span {
    color: #fff;
    -webkit-text-fill-color: #fff;
  }

  .brand-sub {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 3px;
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #3adb76;
    box-shadow: 0 0 8px #3adb76;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-text {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* ===== MAIN LAYOUT ===== */
  .main {
    position: relative;
    z-index: 10;
    display: grid;
    grid-template-columns: 1fr 1fr 300px;
    gap: 20px;
    padding: 24px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ===== SECTION LABELS ===== */
  .section-label {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--copper);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  /* ===== UPLOAD PANEL ===== */
  .upload-panel {
    display: flex;
    flex-direction: column;
  }

  .upload-zone {
    flex: 1;
    min-height: 320px;
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    background: var(--glass);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .upload-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, var(--glow2) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .upload-zone:hover {
    border-color: var(--copper);
    box-shadow: 0 0 20px var(--glow2), inset 0 0 30px var(--glow2);
  }

  .upload-zone:hover::before { opacity: 1; }

  .upload-zone.has-image {
    border-color: var(--amber);
    border-style: solid;
  }

  .upload-zone.dragging {
    border-color: var(--amber);
    box-shadow: 0 0 30px var(--glow);
  }

  .upload-icon {
    font-size: 42px;
    filter: drop-shadow(0 0 8px var(--copper));
  }

  .upload-text {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
  }

  .upload-text strong {
    display: block;
    color: var(--text);
    font-size: 15px;
    margin-bottom: 4px;
  }

  .upload-btn {
    padding: 8px 20px;
    border: 1px solid var(--copper);
    border-radius: 6px;
    background: transparent;
    color: var(--copper);
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .upload-btn:hover {
    background: var(--glass2);
    box-shadow: 0 0 12px var(--glow2);
  }

  #preview-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 10px;
    display: none;
  }

  #file-input { display: none; }

  /* ===== RESULT PANEL ===== */
  .result-panel {
    display: flex;
    flex-direction: column;
  }

  .result-zone {
    flex: 1;
    min-height: 320px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: var(--glass);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }

  .result-zone::after {
    content: 'PREVIEW';
    position: absolute;
    top: 12px;
    right: 12px;
    font-family: 'Orbitron', monospace;
    font-size: 8px;
    letter-spacing: 2px;
    color: var(--border);
  }

  .result-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .result-placeholder-icon {
    font-size: 48px;
    opacity: 0.3;
    filter: grayscale(1);
  }

  .result-placeholder-text {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    text-align: center;
  }

  #result-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 10px;
    display: none;
  }

  /* ===== SAVE BUTTON ===== */
  .save-btn {
    margin-top: 10px;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--muted);
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }

  .save-btn.visible {
    display: block;
  }

  .save-btn:hover {
    border-color: var(--copper);
    color: var(--text);
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ===== COLOR PALETTE ===== */
  .color-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .color-swatch {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
    position: relative;
  }

  .color-swatch::after {
    content: attr(data-name);
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    color: var(--muted);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }

  .color-swatch:hover::after { opacity: 1; }

  .color-swatch:hover {
    transform: scale(1.15);
    box-shadow: 0 0 12px currentColor;
  }

  .color-swatch.selected {
    border-color: var(--amber);
    box-shadow: 0 0 0 3px var(--glow);
    transform: scale(1.1);
  }

  /* ===== SELECTED DISPLAY ===== */
  .selection-display {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-size: 11px;
    color: var(--muted);
  }

  .selection-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
  }

  .selection-val {
    color: var(--amber);
    font-weight: 500;
    font-size: 12px;
  }

  /* ===== GENERATE BUTTON ===== */
  .generate-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--copper) 0%, var(--amber) 100%);
    color: #0a0604;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(245,158,11,0.3);
  }

  .generate-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .generate-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(245,158,11,0.5);
  }

  .generate-btn:hover::before { opacity: 1; }

  .generate-btn:active {
    transform: translateY(0);
  }

  .generate-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* ===== LOADING ===== */
  .loading-bar {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    display: none;
  }

  .loading-bar.active { display: block; }

  .loading-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--copper), var(--amber), var(--copper));
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    width: 40%;
    border-radius: 2px;
  }

  @keyframes shimmer {
    0% { background-position: -200% 0; margin-left: -40%; }
    100% { background-position: 200% 0; margin-left: 100%; }
  }

  /* ===== HAIRSTYLES SECTION (FULL WIDTH) ===== */
  .styles-section {
    position: relative;
    z-index: 10;
    padding: 0 32px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .styles-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
  }

  .style-card {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.25s ease;
    background: var(--glass);
    position: relative;
  }

  .style-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 50%, rgba(245,158,11,0.15) 100%);
    opacity: 0;
    transition: opacity 0.25s;
    z-index: 1;
  }

  .style-card:hover {
    border-color: var(--copper);
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4), 0 0 15px var(--glow2);
  }

  .style-card:hover::before { opacity: 1; }

  .style-card.selected {
    border-color: var(--amber);
    box-shadow: 0 0 20px var(--glow), 0 0 0 1px var(--amber);
  }

  .style-card.selected::before { opacity: 1; }

  .style-thumb {
    width: 100%;
    aspect-ratio: 3/4;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg2);
    position: relative;
    overflow: hidden;
  }

  .style-thumb svg {
    width: 70%;
    height: 70%;
    opacity: 0.7;
  }

  .style-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .style-num {
    position: absolute;
    top: 6px;
    right: 8px;
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    color: var(--muted);
    z-index: 2;
  }

  .style-card.selected .style-num {
    color: var(--amber);
  }

  .check-mark {
    position: absolute;
    top: 6px;
    left: 6px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--amber);
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #000;
    z-index: 2;
    box-shadow: 0 0 8px var(--glow);
  }

  .style-card.selected .check-mark {
    display: flex;
  }

  .style-info {
    padding: 8px 10px;
    position: relative;
    z-index: 2;
  }

  .style-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.5px;
  }

  .style-desc {
    font-size: 9px;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.3px;
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--bg3);
    border: 1px solid var(--amber);
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 13px;
    color: var(--text);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 20px var(--glow);
    z-index: 1000;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.3s ease;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  /* ===== DIVIDER ===== */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 0 32px 24px;
    position: relative;
    z-index: 10;
  }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>

function buildColors() {
  const grid = document.getElementById('color-grid');
  COLORS.forEach((c, i) => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch';
    sw.style.background = c.hex;
    sw.style.border = `2px solid ${c.border || c.hex}`;
    sw.setAttribute('data-name', c.name);
    sw.onclick = () => selectColor(i, sw);
    grid.appendChild(sw);
  });
}

function buildStyles() {
  const grid = document.getElementById('styles-grid');
  STYLES.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'style-card';
    card.id = `style-${i}`;
    card.innerHTML = `
      <div class="style-thumb">
        ${icons[i]}
        <div class="style-num">${String(i+1).padStart(2,'0')}</div>
        <div class="check-mark">✓</div>
      </div>
      <div class="style-info">
        <div class="style-name">${s.name}</div>
        <div class="style-desc">${s.desc}</div>
      </div>
    `;
    card.onclick = () => selectStyle(i, card);
    grid.appendChild(card);
  });
}

function selectStyle(i, card) {
  document.querySelectorAll('.style-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  selectedStyle = i;
  document.getElementById('sel-style').textContent = STYLES[i].name;
  checkReady();
}

function selectColor(i, sw) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  sw.classList.add('selected');
  selectedColor = i;
  document.getElementById('sel-color').textContent = COLORS[i].name;
  checkReady();
}

function checkReady() {
  const btn = document.getElementById('generate-btn');
  btn.disabled = !(selectedStyle !== null && selectedColor !== null && uploadedFile);
}

// FILE UPLOAD
const fileInput = document.getElementById('file-input');
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  uploadedFile = file;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = document.getElementById('preview-img');
    img.src = ev.target.result;
    img.style.display = 'block';
    document.getElementById('upload-placeholder').style.display = 'none';
    document.getElementById('upload-zone').classList.add('has-image');
    document.getElementById('sel-photo').textContent = '✓ Caricata';
    checkReady();
  };
  reader.readAsDataURL(file);
});

// DRAG & DROP
const zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragging'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragging'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('dragging');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    const dt = new DataTransfer();
    dt.items.add(file);
    fileInput.files = dt.files;
    fileInput.dispatchEvent(new Event('change'));
  }
});

// GENERATE (demo — simula loading)
function generate() {
  const btn = document.getElementById('generate-btn');
  const bar = document.getElementById('loading-bar');
  btn.disabled = true;
  btn.textContent = '⏳  Elaborazione AI...';
  bar.classList.add('active');

  // Simula chiamata API (3s)
  setTimeout(() => {
    bar.classList.remove('active');
    btn.disabled = false;
    btn.innerHTML = '⚡ &nbsp; GENERA';

    // Demo: mostra la stessa foto caricata con filtro colore (placeholder)
    const src = document.getElementById('preview-img').src;
    const resultImg = document.getElementById('result-img');
    resultImg.src = src;
    resultImg.style.display = 'block';
    resultImg.style.filter = `hue-rotate(${Math.random()*60-30}deg) saturate(1.4)`;
    document.getElementById('result-placeholder').style.display = 'none';
    document.getElementById('save-btn').classList.add('visible');
    resultDataUrl = src;

    showToast(`✨ Generato: ${STYLES[selectedStyle].name} · ${COLORS[selectedColor].name}`);
  }, 3000);
}

function saveImage() {
  if (!resultDataUrl) return;
  const a = document.createElement('a');
  a.href = resultDataUrl;
  a.download = `hAIr_result_${Date.now()}.jpg`;
  a.click();
  showToast('💾 Immagine salvata!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

buildColors();
buildStyles();
</script>
</body>
</html>
